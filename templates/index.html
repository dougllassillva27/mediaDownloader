<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwai Downloader</title>

    <!-- Meta Tags Básicas -->
    <meta name="description" content="Baixe vídeos e áudios do Kwai rapidamente e sem complicações." />
    <meta name="keywords" content="Kwai, Downloader, MP4, MP3, Vídeo, Áudio" />
    <meta name="author" content="Douglas Silva" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:title" content="Kwai Downloader" />
    <meta property="og:description" content="Baixe vídeos e áudios do Kwai rapidamente." />
    <meta property="og:url" content="https://kwaidownloader.dougllassillva.com.br/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://kwaidownloader.dougllassillva.com.br/assets/img/Kwai-Downloader.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Kwai Downloader" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kwai Downloader" />
    <meta name="twitter:description" content="Baixe vídeos e áudios do Kwai rapidamente." />
    <meta name="twitter:image" content="https://kwaidownloader.dougllassillva.com.br/assets/img/Kwai-Downloader.webp" />

    <link rel="icon" type="image/x-icon" href="/assets/img/Kwai-Downloader.ico">

    <style>
        :root {
            --primary: #ff5000;
            --dark: #121212;
            --light: #f4f4f4;
            --card: #1e1e1e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: var(--primary); margin-bottom: 20px; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #2a2a2a;
            color: white;
        }
        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #preview {
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .thumb {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .actions {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        .loading {
            display: none;
            margin: 15px 0;
            color: #aaa;
        }
        /* Overlay de Loading */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 80, 0, 0.3);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #overlay p { font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner"></div>
    <p id="overlayText">Processando...</p>
</div>

<div class="container">
    <h1>Kwai Downloader</h1>
    <p>Baixe vídeos e áudios do Kwai rapidamente.</p>
    
    <div class="input-group">
        <input type="text" id="kwaiUrl" placeholder="Cole o link do Kwai aqui...">
        <button id="btnFetch">Analisar</button>
    </div>

    <div id="loading" class="loading">Analisando vídeo... aguarde.</div>

    <div id="preview">
        <img id="videoThumb" src="" class="thumb">
        <h3 id="videoTitle"></h3>
        <div class="actions">
            <button id="btnMp4">Download MP4</button>
            <button id="btnMp3">Download MP3</button>
        </div>
    </div>
</div>

<script>
    const btnFetch = document.getElementById('btnFetch');
    const inputUrl = document.getElementById('kwaiUrl');
    const preview = document.getElementById('preview');
    const loading = document.getElementById('loading');
    const overlay = document.getElementById('overlay');
    const overlayText = document.getElementById('overlayText');
    const btnMp3 = document.getElementById('btnMp3');
    const btnMp4 = document.getElementById('btnMp4');
    
    let lastProcessedUrl = "";

    function showOverlay(text) {
        overlayText.innerText = text;
        overlay.style.display = "flex";
    }

    function hideOverlay() {
        overlay.style.display = "none";
    }

    btnFetch.onclick = async () => {
        const rawText = inputUrl.value.trim();
        if(!rawText) return alert("Cole uma URL ou texto com link!");

        showOverlay("Analisando vídeo...");
        preview.style.display = "none";
        btnFetch.disabled = true;

        try {
            const formData = new FormData();
            formData.append('url', rawText);

            const response = await fetch('/api/info', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if(data.success) {
                document.getElementById('videoThumb').src = data.thumbnail;
                document.getElementById('videoTitle').innerText = data.title;
                lastProcessedUrl = data.source; // URL limpa vinda do backend
                preview.style.display = "block";
            } else {
                alert("Erro: " + data.error);
            }
        } catch (e) {
            alert("Erro na conexão com o servidor.");
        } finally {
            hideOverlay();
            btnFetch.disabled = false;
        }
    };

    btnMp4.onclick = async () => {
        showOverlay("Preparando vídeo...");
        const url = encodeURIComponent(lastProcessedUrl);
        
        try {
            // Usamos fetch para o MP4 para controlar o overlay e notificar o usuário
            const response = await fetch(`/api/download/mp4?url=${url}`);
            if (!response.ok) throw new Error("Erro ao baixar MP4.");

            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            const contentDisposition = response.headers.get('Content-Disposition');
            let filename = "video.mp4";
            if (contentDisposition) {
                const match = contentDisposition.match(/filename="(.+)"/);
                if (match) filename = match[1];
            }

            a.href = downloadUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(downloadUrl);
            
            alert("Download iniciado!");
        } catch (e) {
            alert("Erro no download: " + e.message);
        } finally {
            hideOverlay();
        }
    };

    btnMp3.onclick = async () => {
        showOverlay("Convertendo áudio... aguarde.");
        
        const url = encodeURIComponent(lastProcessedUrl);
        
        try {
            const response = await fetch(`/api/download/mp3?url=${url}`);
            if (!response.ok) throw new Error("Erro no processamento do MP3.");

            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            const contentDisposition = response.headers.get('Content-Disposition');
            let filename = "audio.mp3";
            if (contentDisposition) {
                const match = contentDisposition.match(/filename="(.+)"/);
                if (match) filename = match[1];
            }

            a.href = downloadUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(downloadUrl);

            alert("Download iniciado!");
        } catch (e) {
            alert("Erro ao converter MP3: " + e.message);
        } finally {
            hideOverlay();
        }
    };
</script>

</body>
</html>
